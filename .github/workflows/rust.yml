name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable
          override: true
          components: rustfmt

      - name: Check format
        run: cargo fmt -- --check

  Linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

  Testing:
    needs: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable
          override: true

      - name: Install system dependencies
        run: |
          sudo apt-get install --yes zlib1g-dev libbz2-dev musl musl-dev musl-tools clang libc6-dev

      - uses: Swatinem/rust-cache@v1.3.0

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test

  Testing-Features:
    needs: Formatting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - no-default-features
          - all-features
        include:
          - target: no-default-features
            args: --no-default-features
            use_cross: false
          - target: all-features
            args: --all-features
            toolchain_target: x86_64-unknown-linux-musl
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable
          override: true

      - name: Install system dependencies
        run: |
          sudo apt-get install --yes zlib1g-dev libbz2-dev musl musl-dev musl-tools clang libc6-dev lldb lld

      - uses: Swatinem/rust-cache@v1.3.0

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: ${{ matrix.args }}
          use-cross: ${{ matrix.use_cross }}

  Testing-MacOS:
    needs: Formatting
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - silicon-sonoma
        include:
          - target: silicon-sonoma
            os: macOS-14.0
            toolchain_target: aarch64-apple-darwin
            toolchain: stable
            aux_args: ""
            default: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.toolchain_target }}
          override: true
          default: ${{ matrix.default }}

      - name: Install htslib dependencies
        run: brew install bzip2 zlib xz curl-openssl

      - name: Test
        uses: actions-rs/cargo@v1.0.1
        with:
          use-cross: false # cross is not supported on GHA OSX runner, see: https://github.community/t/why-is-docker-not-installed-on-macos/17017
          command: test
          args: --release --all-features --verbose ${{ matrix.aux_args }}
